name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  commits:
    name: conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.x"
      - run: pip install commitizen
      - name: Validate commit messages (Conventional Commits)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: cz check --rev-range "origin/${BASE_REF}..HEAD"

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # stable branch
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  deny:
    name: cargo-deny (advisories + licences)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25  # v2.1.1

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # stable branch
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      # Sur Windows, le test d'ingestion se désactive tout seul si ffmpeg est absent.
      - name: Build (workspace, default features)
        run: cargo build --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  linux-gui:
    name: linux front (GTK4/GStreamer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # stable branch
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Install GTK4 + GStreamer dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libgstreamer1.0-dev
      - name: Build GUI feature
        run: cargo build -p champinium-linux --features gui
      - name: Clippy GUI feature
        run: cargo clippy -p champinium-linux --features gui -- -D warnings

  macos-app:
    name: macOS bindings + swift build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Install just
        run: cargo install just
      - name: Install uniffi-bindgen-cs (matches uniffi 0.28.3)
        run: cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.9.2+v0.28.3
      - name: Generate C# bindings
        run: just gen-csharp
      - name: Lint Swift (swiftformat, config apps/macos/.swiftformat)
        run: |
          brew install swiftformat
          swiftformat --lint apps/macos
      - name: Build macOS app (XCFramework + swift build)
        run: just macos-build

  windows-app:
    name: Windows front (WinUI 3 / C#)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          dotnet-version: "8.0.x"
      - name: Install just
        run: cargo install just
      - name: Install uniffi-bindgen-cs (matches uniffi 0.28.3)
        run: cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.9.2+v0.28.3
      - name: Build core + generate C# bindings
        run: just gen-csharp
      - name: Build Windows app (dotnet build)
        run: dotnet build apps/windows/Champinium.sln -c Release -p:Platform=x64
      - name: Format check (dotnet format, code manuscrit uniquement)
        # --include limite au code écrit à la main : les bindings UniFFI générés
        # (bindings/csharp/, inclus via Compile Include) ne sont pas formatés.
        run: dotnet format apps/windows/Champinium.sln --verify-no-changes --no-restore --include apps/windows/Champinium/

  flatpak:
    name: Linux front (Flatpak, build de validation)
    # Valide le manifeste packaging/flatpak/org.champinium.Champinium.yml —
    # même esprit que linux-gui/macos-app/windows-app : bloquant comme les
    # autres jobs front, pas de continue-on-error (le repo ne fait
    # d'exception pour aucun des trois OS malgré des builds déjà coûteux —
    # xcodebuild/dotnet build tournent sans filet, Flatpak suit la même règle).
    # N'attaque PAS Flathub : c'est un build+bundle local dans le conteneur
    # CI, jamais publié.
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: flatpak/flatpak-github-actions/flatpak-builder@bf5cafdfd97dcf5a89c7475bbc86a616e1f86acb  # v6.7
        with:
          bundle: champinium.flatpak
          manifest-path: packaging/flatpak/org.champinium.Champinium.yml
          cache-key: flatpak-builder-${{ github.sha }}
      - name: Upload workflow artifact (bundle de validation)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: champinium-flatpak
          path: champinium.flatpak
