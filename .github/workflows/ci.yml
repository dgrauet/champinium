name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      # Sur Windows, le test d'ingestion se désactive tout seul si ffmpeg est absent.
      - name: Build (workspace, default features)
        run: cargo build --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  linux-gui:
    name: linux front (GTK4/GStreamer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install GTK4 + GStreamer dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libgstreamer1.0-dev
      - name: Build GUI feature
        run: cargo build -p champinium-linux --features gui
      - name: Clippy GUI feature
        run: cargo clippy -p champinium-linux --features gui -- -D warnings

  macos-app:
    name: macOS bindings + swift build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install just
        run: cargo install just
      - name: Install uniffi-bindgen-cs (matches uniffi 0.28.3)
        run: cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.9.2+v0.28.3
      - name: Generate C# bindings
        run: just gen-csharp
      - name: Build macOS app (XCFramework + swift build)
        run: just macos-build
