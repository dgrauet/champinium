name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  commits:
    name: conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.x"
      - run: pip install commitizen
      - name: Validate commit messages (Conventional Commits)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: cz check --rev-range "origin/${BASE_REF}..HEAD"

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # stable branch
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  deny:
    name: cargo-deny (advisories + licences)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe  # v2.0.20

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # stable branch
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      # Sur Windows, le test d'ingestion se désactive tout seul si ffmpeg est absent.
      - name: Build (workspace, default features)
        run: cargo build --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  linux-gui:
    name: linux front (GTK4/GStreamer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # stable branch
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Install GTK4 + GStreamer dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libgstreamer1.0-dev
      - name: Build GUI feature
        run: cargo build -p champinium-linux --features gui
      - name: Clippy GUI feature
        run: cargo clippy -p champinium-linux --features gui -- -D warnings

  macos-app:
    name: macOS bindings + swift build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Install just
        run: cargo install just
      - name: Install uniffi-bindgen-cs (matches uniffi 0.28.3)
        run: cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.9.2+v0.28.3
      - name: Generate C# bindings
        run: just gen-csharp
      - name: Lint Swift (swiftformat, config apps/macos/.swiftformat)
        run: |
          brew install swiftformat
          swiftformat --lint apps/macos
      - name: Build macOS app (XCFramework + swift build)
        run: just macos-build

  windows-app:
    name: Windows front (WinUI 3 / C#)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
        with:
          dotnet-version: "8.0.x"
      - name: Install just
        run: cargo install just
      - name: Install uniffi-bindgen-cs (matches uniffi 0.28.3)
        run: cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.9.2+v0.28.3
      - name: Build core + generate C# bindings
        run: just gen-csharp
      - name: Build Windows app (dotnet build)
        run: dotnet build apps/windows/Champinium.sln -c Release -p:Platform=x64
      - name: Format check (dotnet format, code manuscrit uniquement)
        # --include limite au code écrit à la main : les bindings UniFFI générés
        # (bindings/csharp/, inclus via Compile Include) ne sont pas formatés.
        run: dotnet format apps/windows/Champinium.sln --verify-no-changes --no-restore --include apps/windows/Champinium/
