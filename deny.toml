# cargo-deny — scan vulnérabilités (RustSec) + licences du workspace (RUST_SA002).
# CI : job `deny` dans ci.yml. Local : `cargo deny check`.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # bincode 1.x n'est plus maintenu ; dépendance directe de champinium-seed.
    # Migration prévue vers bincode 2 ou postcard (changement de format on-disk).
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x unmaintained — migration seed à planifier" },
    # paste n'est plus maintenu ; dépendance transitive (uniffi, gtk4-rs macros),
    # aucun remplacement possible de notre côté.
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained — transitif via uniffi/gtk4-rs" },
    # rsa (attaque Marvin) : l'avis amont a `patched = []` (jamais mis à jour)
    # bien que la ligne 0.10.0-rc utilisée ici porte la mitigation
    # (BlindedSigningKey) — voir .superpowers/sdd/coldstore-decision.md
    # (addendum Tâche 4). Dépendance de `champinium-core` (feature
    # `cold-storage`, signature de transaction Arweave), désormais résolue par
    # défaut via `champinium-cli` (Tâche 5, CS-a).
    { id = "RUSTSEC-2023-0071", reason = "rsa 0.10.0-rc porte déjà la mitigation Marvin (BlindedSigningKey) ; avis amont non mis à jour, cf. coldstore-decision.md" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
