# cargo-deny — scan vulnérabilités (RustSec) + licences du workspace (RUST_SA002).
# CI : job `deny` dans ci.yml. Local : `cargo deny check`.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # bincode 1.x n'est plus maintenu ; dépendance directe de champinium-seed.
    # Migration prévue vers bincode 2 ou postcard (changement de format on-disk).
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x unmaintained — migration seed à planifier" },
    # paste n'est plus maintenu ; dépendance transitive (uniffi, gtk4-rs macros),
    # aucun remplacement possible de notre côté.
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained — transitif via uniffi/gtk4-rs" },
    # rsa (Marvin, timing sidechannel) — uniquement sous la feature OPT-IN
    # `cold-storage`, pour la signature Arweave (aucune crate Arweave viable, cf.
    # ADR 0008). La 0.9 stable est vulnérable SANS mitigation ; la 0.10-rc porte
    # la mitigation (signature aveuglée `BlindedSigningKey`) que nous utilisons.
    # Le build par défaut ne tire jamais rsa ; la CI cargo-deny scanne toutefois
    # `--all-features`, d'où cet ignore explicite. À retirer/repasser dès que
    # rsa 0.10.0 stable sort.
    { id = "RUSTSEC-2023-0071", reason = "rsa 0.10-rc Marvin — feature cold-storage opt-in, signature Arweave aveuglée (BlindedSigningKey) ; à repasser stable à la 0.10.0" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
