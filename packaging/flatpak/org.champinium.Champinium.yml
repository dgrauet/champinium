# Manifeste Flatpak — front Linux GTK4 de Champinium.
#
# Patron standard « GNOME Rust app » : runtime GNOME + extension SDK
# rust-stable pour builder cargo, module unique compilant `champinium-linux`
# (feature `gui`).
#
# Choix de version : org.gnome.Platform/Sdk 47 (stable courante au moment de
# l'écriture de ce manifeste — à faire suivre lors des mises à jour GNOME).
#
# GStreamer : org.gnome.Platform embarque gstreamer1.0 core + plugins-base +
# plugins-good (assez pour VP8/VP9/Opus/WebM). Les plugins **plugins-bad** et
# **libav** (nécessaires pour H.264/AAC — voir scripts/package-linux-app.sh qui
# les liste comme dépendances système du tarball) NE SONT PAS embarqués par le
# runtime GNOME de base (restrictions de brevets/licences en amont). Ce
# manifeste ne les construit pas depuis les sources pour l'instant : c'est un
# suivi documenté (voir docs/packaging.md), pas un blocage du build Flatpak
# lui-même. À terme : soit compiler gst-plugins-bad/gst-libav en module
# flatpak-builder, soit dépendre d'une extension Flathub équivalente si une
# apparaît pour org.gnome.Platform.
#
# Sources cargo : ce manifeste build avec `--share=network` pendant le module
# de compilation (cargo télécharge les crates depuis crates.io). C'est un
# ÉCART assumé par rapport au patron Flatpak/Flathub « correct » qui utiliserait
# des sources vendorisées hors-ligne (cargo-sources.json généré par
# flatpak-cargo-generator, cf. https://github.com/flatpak/flatpak-builder-tools).
# Générer ce fichier nécessite un accès réseau + le script flatpak-cargo-generator,
# indisponibles dans l'environnement où ce manifeste a été rédigé (pas de
# Flatpak ni de clone du dépôt flatpak-builder-tools). Le job CI qui construit
# ce manifeste a un accès réseau (runner GitHub Actions) donc `--share=network`
# au build fonctionne ; une vraie publication Flathub devrait basculer sur les
# sources vendorisées pour la reproductibilité (Flathub l'exige d'ailleurs pour
# les modules cargo). Noté comme suivi dans docs/packaging.md.

app-id: org.champinium.Champinium
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: champinium

# Permissions minimales pour un lecteur P2P (pas de --filesystem=host) :
# - réseau : libp2p (TCP/QUIC) parle au monde entier, pas de proxy possible.
# - wayland + fallback-x11 + dri : fenêtre GTK4 + rendu vidéo GStreamer (GL).
# - ipc : partagé par GStreamer/GTK pour certains plugins (memfd, shm).
# - pulseaudio : sortie audio de la lecture GStreamer.
#
# Persistance des données (identité Ed25519, blocs, `.seed_index`, etc.) :
# `champinium-core::paths::default_data_dir()` résout en
# `$XDG_DATA_HOME/champinium` (repli `~/.local/share/champinium`). Sous
# Flatpak, `XDG_DATA_HOME` est automatiquement redirigé par le sandbox vers
# `~/.var/app/org.champinium.Champinium/data` — AUCUNE permission
# `--filesystem` supplémentaire n'est nécessaire pour que l'identité/les blocs
# persistent : c'est déjà dans le bac à sable de l'app, entre relances. Donc
# pas de `--filesystem=xdg-download` ni `--filesystem=host` : l'app n'a
# aujourd'hui aucun besoin documenté de lire/écrire en dehors de son propre
# répertoire de données Flatpak.
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri

modules:
  - name: champinium
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      build-args:
        - --share=network
    build-commands:
      - cargo build --release -p champinium-linux --features gui
      - install -Dm755 target/release/champinium /app/bin/champinium
      - install -Dm644 packaging/flatpak/org.champinium.Champinium.desktop
        /app/share/applications/org.champinium.Champinium.desktop
      - install -Dm644 packaging/flatpak/org.champinium.Champinium.metainfo.xml
        /app/share/metainfo/org.champinium.Champinium.metainfo.xml
    sources:
      - type: dir
        path: ../..
        skip:
          - .git
          - target
          - dist
          - apps/macos/.build
          - apps/windows/**/bin
          - apps/windows/**/obj
